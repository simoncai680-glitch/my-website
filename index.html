<!DOCTYPE html>
<html>
  <head>
    <title>待办清单</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-indigo-50 min-h-screen flex items-center justify-center">

    <!-- 登录/注册页面 -->
    <div id="authPage" class="bg-white rounded-2xl shadow-lg p-8 w-96">
      <h1 class="text-3xl font-bold text-indigo-600 mb-6">📝 待办清单</h1>

      <input id="username" type="text" placeholder="用户名"
        class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mb-3 focus:outline-none focus:border-indigo-400">
      <input id="password" type="password" placeholder="密码"
        class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 mb-4 focus:outline-none focus:border-indigo-400">

      <div class="flex gap-2">
        <button onclick="register()"
          class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 rounded-lg font-medium">
          注册
        </button>
        <button onclick="login()"
          class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded-lg font-medium">
          登录
        </button>
      </div>

      <p id="authError" class="text-red-500 text-sm mt-3 text-center"></p>
    </div>

    <!-- 待办清单页面 -->
    <div id="todoPage" class="bg-white rounded-2xl shadow-lg p-8 w-96 hidden">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-indigo-600">📝 待办清单</h1>
        <button onclick="logout()" class="text-gray-400 hover:text-gray-600 text-sm">退出</button>
      </div>

      <div class="flex gap-2 mb-6">
        <input id="taskInput" type="text" placeholder="输入新任务..."
          class="flex-1 border-2 border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-400">
        <button onclick="addTask()"
          class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium">
          添加
        </button>
      </div>

      <div id="taskList" class="flex flex-col gap-2"></div>
    </div>

    <script>
      let token = '';

      // 注册
      async function register() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) return;

        const res = await fetch('https://my-server-01fe.onrender.com/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.error) {
          document.getElementById('authError').innerText = data.error;
        } else {
          document.getElementById('authError').style.color = 'green';
          document.getElementById('authError').innerText = '注册成功，请登录！';
        }
      }

      // 登录
      async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) return;

        const res = await fetch('https://my-server-01fe.onrender.com/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.error) {
          document.getElementById('authError').innerText = data.error;
        } else {
          token = data.token;
          document.getElementById('authPage').classList.add('hidden');
          document.getElementById('todoPage').classList.remove('hidden');
          loadTasks();
        }
      }

      // 退出
      function logout() {
        token = '';
        document.getElementById('authPage').classList.remove('hidden');
        document.getElementById('todoPage').classList.add('hidden');
      }

      // 加载任务
      async function loadTasks() {
        const res = await fetch('https://my-server-01fe.onrender.com/api/todos', {
          headers: { 'Authorization': token }
        });
        const todos = await res.json();
        const taskList = document.getElementById('taskList');
        taskList.innerHTML = '';
        todos.forEach(todo => renderTask(todo));
      }

      // 添加任务
      async function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();
        if (!text) return;

        const res = await fetch('https://my-server-01fe.onrender.com/api/todos', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': token
          },
          body: JSON.stringify({ text })
        });
        const todo = await res.json();
        renderTask(todo);
        input.value = '';
      }

      // 删除任务
      async function deleteTask(id) {
        await fetch(`https://my-server-01fe.onrender.com/api/todos/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': token }
        });
        loadTasks();
      }

      // 渲染任务
      function renderTask(todo) {
        const taskList = document.getElementById('taskList');
        const item = document.createElement('div');
        item.className = 'flex justify-between items-center bg-indigo-50 px-4 py-3 rounded-lg';
        item.innerHTML = `
          <span class="text-gray-700">${todo.text}</span>
          <button onclick="deleteTask(${todo.id})"
            class="text-red-400 hover:text-red-600 font-medium text-sm">
            删除
          </button>
        `;
        taskList.appendChild(item);
      }

      // 回车登录
      document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
      });
    </script>
  </body>
</html>
